<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfólio de Projetos - Fatec Jacareí</title>
</head>
<body>
  <p>Carregando a versão atualizada do portfólio...</p>
  <script>
    (async () => {
      const response = await fetch('https://raw.githubusercontent.com/Luiza-Manchini/portifolio/main/index.html');
      const html = await response.text();
      const updated = html.replace('<head>', '<head><base href="https://luiza-manchini.github.io/portifolio/">');
      document.open();
      document.write(updated);
      document.close();
    })().catch(() => {
      document.body.innerHTML = '<p>Não foi possível carregar a versão atualizada. <a href="https://luiza-manchini.github.io/portifolio/">Abrir o portfólio atualizado</a>.</p>';
    });
  </script>
</body>
</html>
